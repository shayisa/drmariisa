name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate basePath for GitHub Pages
        run: node -e "require('fs').writeFileSync('src/lib/basePath.ts','export const BASE_PATH = \"/drmariisa\";\nexport function asset(path: string): string { return \`\${BASE_PATH}\${path}\`; }\n');console.log('Generated basePath.ts');console.log(require('fs').readFileSync('src/lib/basePath.ts','utf8'))"

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: "/drmariisa"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "out"

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
